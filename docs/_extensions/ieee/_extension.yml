title: IEEE Template
author: Gael Close
version: 0.1.0
contributes:
  formats:
    pdf:
      template: ieee-template.tex
      fig-format: png
      csl: ieee-with-url.csl
      cite-method: citeproc
      keep-tex: false
      link-citations: false # not used in final IEEE paper as per IEEE policy
      format-resources:
        # Add here the resources required for the PDF rendering
    
        - custom.scss
        - IEEEtran.cls
        - ieeeaccess.cls
        - ieee-preamble.tex
        - bullet.png
        - logo.png
        - notaglinelogo.png
      shift-heading-level-by: -1
        
  